name: Custom APK Auto Patch & Release

on:
  workflow_dispatch: # 사용자가 원할 때 수동으로 버튼을 눌러 빌드하는 방식
  push:
    paths:
      - 'patch-config.json' # 설정 파일만 고쳐서 저장하면 자동으로 빌드가 돌게 설정

jobs:
  patch-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK & Build Tools
        uses: android-actions/setup-android@v3

      - name: Install Apktool & Uber APK Signer
        run: |
          sudo apt-get update && sudo apt-get install -y wget
          mkdir -p bin
          wget https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O bin/apktool.jar
          wget https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O bin/uber-apk-signer.jar

          # apktool 실행용 래퍼 스크립트 작성
          echo '#!/bin/bash' > bin/apktool
          echo 'exec java -jar '"$GITHUB_WORKSPACE"'/bin/apktool.jar "$@"' >> bin/apktool
          chmod +x bin/apktool
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Read Patch Settings
        id: settings
        run: |
          if [ -f patch-config.json ]; then
            DOMAIN=$(jq -r '.target_domain' patch-config.json)
          else
            DOMAIN="sbxh9.com"
          fi
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT

      - name: Decompile 1.4.3 APK
        run: |
          apktool d apk/tachiyomi-ko.ntk-v1.4.3-release.apk -o decompiled_apk

      - name: Apply Ad Bypass & Domain Patches (Smali Injection)
        run: |
          echo "설정한 도메인: ${{ steps.settings.outputs.domain }}"
          
          # 1. Smali 파일들 전체에서 기존 도메인(sbxh9.com)을 신규 도메인으로 전부 교체
          find decompiled_apk/smali* -type f -exec sed -i 's/sbxh9.com/${{ steps.settings.outputs.domain }}/g' {} +
          find decompiled_apk/smali* -type f -exec sed -i 's/sbxh9//g' {} +

          # 2. WebView 및 OkHttp 클라이언트에 PC용 User-Agent 강제 주입하여 차단 우회
          # (봇 감지 방지를 위해 Smali 레벨에서 헤더 및 U-A 패치 진행)
          TARGET_UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          find decompiled_apk/smali* -type f -name "*okhttp*" -exec sed -i "s|User-Agent|$TARGET_UA|g" {} +

      - name: Rebuild APK
        run: |
          apktool b decompiled_apk -o patched_unsigned.apk

      - name: Sign Patched APK (Uber APK Signer)
        run: |
          java -jar bin/uber-apk-signer.jar --apks patched_unsigned.apk -o output_signed/ --allowResign

      - name: Create GitHub Release and Upload Patched APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.4.3-patched-${{ github.run_number }}"
          name: "NTK-Custom-Patch-v1.4.3"
          body: "자동 우회 패치가 적용된 전용 1.4.3 APK 파일입니다. 도메인: ${{ steps.settings.outputs.domain }}"
          draft: false
          prerelease: false
          files: output_signed/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
