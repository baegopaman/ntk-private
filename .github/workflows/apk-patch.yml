name: Custom APK Auto Patch & Release

on:
  workflow_dispatch:
  push:
    paths:
      - 'patch-config.json'

jobs:
  patch-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK & Build Tools
        uses: android-actions/setup-android@v3

      - name: Install Apktool & Uber APK Signer
        run: |
          sudo apt-get update && sudo apt-get install -y wget
          mkdir -p bin
          wget https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O bin/apktool.jar
          wget https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O bin/uber-apk-signer.jar
          echo '#!/bin/bash' > bin/apktool
          echo 'exec java -jar '"$GITHUB_WORKSPACE"'/bin/apktool.jar "$@"' >> bin/apktool
          chmod +x bin/apktool
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Read Patch Settings
        id: settings
        run: |
          if [ -f patch-config.json ]; then
            DOMAIN=$(jq -r '.target_domain' patch-config.json)
          else
            DOMAIN="sbxh9.com"
          fi
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT

      - name: Decompile 1.4.3 APK
        run: |
          apktool d NTK-Mihon-Extension-main/apk/tachiyomi-ko.ntk-v1.4.3-release.apk -o decompiled_apk

      - name: Apply Ad Bypass & Domain Patches (Smali Injection)
        run: |
          echo "설정한 도메인: ${{ steps.settings.outputs.domain }}"
          find decompiled_apk/smali* -type f -exec sed -i 's/newtoki/sbxh/g' {} +
          find decompiled_apk/smali* -type f -exec sed -i 's/\.org/\.com/g' {} +
          find decompiled_apk/smali* -type f -exec sed -i 's/newtoki1.org/${{ steps.settings.outputs.domain }}/g' {} +
          find decompiled_apk/smali* -type f -exec sed -i 's/sbxh9.com/${{ steps.settings.outputs.domain }}/g' {} +
          
          # 모바일 헤더 주입
          TARGET_UA="Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36"
          find decompiled_apk/smali* -type f -exec sed -i "s|User-Agent|$TARGET_UA|g" {} +
          
          # 1. Interceptor 헤더 패치
          find decompiled_apk/smali* -type f -name "*Interceptor*.smali" -exec sed -i '/.method.*intercept/a \    const-string v0, "X-Requested-With"\n    const-string v1, "com.android.chrome"\n    invoke-virtual {p1, v0, v1}, Lokhttp3/Request$Builder;->addHeader(Ljava/lang/String;Ljava/lang/String;)Lokhttp3/Request$Builder;' {} +
          
          # 2. 강제 인증 통과 (Ad/Popup 관련 클래스에 강제 리턴값 주입)
          # 'isAdAcknowledged', 'checkAd', 'shouldShowAd' 등 광고 체크 메서드 무력화
          find decompiled_apk/smali* -type f -exec sed -i '/method.*isAd/a \    const/4 v0, 0x1\n    return v0' {} +
          find decompiled_apk/smali* -type f -exec sed -i '/method.*checkAd/a \    const/4 v0, 0x1\n    return v0' {} +
          find decompiled_apk/smali* -type f -exec sed -i '/method.*shouldShow/a \    const/4 v0, 0x0\n    return v0' {} +

      - name: Rebuild APK
        run: |
          apktool b decompiled_apk -o patched_unsigned.apk

      - name: Sign Patched APK (Uber APK Signer)
        run: |
          java -jar bin/uber-apk-signer.jar --apks patched_unsigned.apk -o output_signed/ --allowResign

      - name: Upload Patched APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: patched-apk
          path: output_signed/patched_unsigned-aligned-debugSigned.apk
